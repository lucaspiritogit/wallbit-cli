name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset_name: wallbit-cli-linux-x64
          - target: bun-linux-arm64
            asset_name: wallbit-cli-linux-arm64
          - target: bun-darwin-x64
            asset_name: wallbit-cli-darwin-x64
          - target: bun-darwin-arm64
            asset_name: wallbit-cli-darwin-arm64
          - target: bun-windows-x64
            asset_name: wallbit-cli-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p dist
          bun build src/index.tsx --compile --target ${{ matrix.target }} --outfile dist/${{ matrix.asset_name }}

      - name: Generate checksum
        run: |
          cd dist
          sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
